name: Daily Price Fetch

on:
  schedule:
    - cron: '30 7 * * *'  # 每天 07:30 UTC = 15:30 北京时间
  workflow_dispatch:     # 支持手动触发

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史以便提交
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: Fetch prices from Gas Alberta
        run: |
          python3 scripts/auto_fetch.py
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push if changed
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add vercel-deploy/
          git commit -m "Daily price update: $(date -u)"
          git push origin main
